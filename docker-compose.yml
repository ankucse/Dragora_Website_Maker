

services:
  mongodb:
    image: mongo:latest
    container_name: builder-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: builder-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/websitebuilder
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: builder-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8080/api

volumes:
  mongodb_data:
